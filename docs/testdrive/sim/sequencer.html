<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PER|FORMER Test Drive</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0c1116;
      --panel: #131b23;
      --panel-border: #24313d;
      --text: #e4edf4;
      --muted: #94a8b7;
      --accent: #5dc0ff;
      --accent-soft: rgba(93, 192, 255, 0.18);
      --danger: #ff7676;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, #16202a 0%, var(--bg) 55%);
      color: var(--text);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 20px;
    }

    .shell {
      width: min(100%, 1040px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .panel {
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(19, 27, 35, 0.96), rgba(12, 17, 22, 0.98));
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 20px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .panel-head h1 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .panel-head p {
      margin: 0;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 14px 20px 0;
    }

    .toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .toolbar-status {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-left: auto;
    }

    .toolbar button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      padding: 9px 14px;
      font: inherit;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }

    .toolbar button:hover:not(:disabled) {
      background: rgba(93, 192, 255, 0.12);
      border-color: rgba(93, 192, 255, 0.5);
    }

    .toolbar button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 0.84rem;
      color: var(--muted);
    }

    .pill strong {
      color: var(--text);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .pill[data-state="ready"],
    .pill[data-state="on"] {
      border-color: rgba(93, 192, 255, 0.35);
      color: #d7f4ff;
    }

    .pill[data-state="error"] {
      border-color: rgba(255, 118, 118, 0.4);
      color: #ffd2d2;
    }

    .stage {
      position: relative;
      padding: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: auto;
    }

    canvas.emscripten {
      display: block;
      width: 100%;
      height: auto;
      max-width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #000;
      image-rendering: auto;
    }

    .loading {
      padding: 0 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 22px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    #spinner {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.16);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
      flex: 0 0 auto;
    }

    #progress {
      width: 100%;
      height: 10px;
      appearance: none;
      border: 0;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
    }

    #progress::-webkit-progress-bar {
      background: rgba(255, 255, 255, 0.08);
    }

    #progress::-webkit-progress-value {
      background: linear-gradient(90deg, var(--accent-soft), var(--accent));
    }

    #progress::-moz-progress-bar {
      background: linear-gradient(90deg, var(--accent-soft), var(--accent));
    }

    #output {
      display: none;
      margin: 0;
      padding: 14px 16px 16px;
      white-space: pre-wrap;
      font: 0.8rem/1.45 Menlo, Monaco, Consolas, monospace;
      color: #ffd1d1;
      background: rgba(255, 118, 118, 0.08);
      border-top: 1px solid rgba(255, 118, 118, 0.2);
      max-height: 220px;
      overflow: auto;
    }

    .shell.is-error #output {
      display: block;
    }

    .shell.is-error #status {
      color: var(--danger);
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 10px;
      }

      .panel-head {
        flex-direction: column;
        align-items: flex-start;
      }

      .toolbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .toolbar-status {
        margin-left: 0;
      }

      .stage {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="shell" id="shell">
    <div class="panel">
      <div class="panel-head">
        <h1>PER|FORMER Browser Test Drive</h1>
        <p>Phase 2 preview: audio now starts only after an explicit user gesture.</p>
      </div>
      <div class="toolbar">
        <div class="toolbar-actions">
          <button id="audio-toggle" type="button" disabled>Enable audio</button>
          <button id="focus-toggle" type="button" disabled>Focus keyboard</button>
          <button id="reset-sim" type="button">Reset simulator</button>
          <button id="load-demo" type="button">Load demo state</button>
        </div>
        <div class="toolbar-status">
          <div class="pill" id="sim-pill" data-state="loading"><strong>Simulator</strong> <span id="sim-state">Loading</span></div>
          <div class="pill" id="audio-pill" data-state="off"><strong>Audio</strong> <span id="audio-state">Off</span></div>
        </div>
      </div>
      <div class="stage">
        <canvas class="emscripten" id="canvas" tabindex="-1" oncontextmenu="event.preventDefault()"></canvas>
      </div>
      <div class="loading">
        <div class="status-row">
          <div id="spinner" aria-hidden="true"></div>
          <div id="status">Loading simulator...</div>
        </div>
        <progress id="progress" max="100" value="0"></progress>
      </div>
      <pre id="output" aria-live="polite"></pre>
    </div>
  </div>

  <script>
    var shell = document.getElementById("shell");
    var statusElement = document.getElementById("status");
    var progressElement = document.getElementById("progress");
    var spinnerElement = document.getElementById("spinner");
    var outputElement = document.getElementById("output");
    var canvasElement = document.getElementById("canvas");
    var audioToggle = document.getElementById("audio-toggle");
    var focusToggle = document.getElementById("focus-toggle");
    var resetButton = document.getElementById("reset-sim");
    var loadDemoButton = document.getElementById("load-demo");
    var simPill = document.getElementById("sim-pill");
    var simStateElement = document.getElementById("sim-state");
    var audioPill = document.getElementById("audio-pill");
    var audioStateElement = document.getElementById("audio-state");
    var runtimeReady = false;
    var audioEnabled = false;

    function setSimulatorState(state, label) {
      simPill.dataset.state = state;
      simStateElement.textContent = label;
    }

    function setAudioState(state, label) {
      audioPill.dataset.state = state;
      audioStateElement.textContent = label;
    }

    function refreshControls() {
      audioToggle.disabled = !runtimeReady;
      focusToggle.disabled = !runtimeReady;
      audioToggle.textContent = audioEnabled ? "Disable audio" : "Enable audio";
    }

    function setStatus(text) {
      if (!text) {
        statusElement.textContent = "";
        return;
      }

      statusElement.textContent = text;
    }

    function setProgress(value) {
      if (typeof value !== "number" || Number.isNaN(value)) {
        progressElement.removeAttribute("value");
        return;
      }

      progressElement.value = Math.max(0, Math.min(100, value));
    }

    function showError(text) {
      shell.classList.add("is-error");
      spinnerElement.style.display = "none";
      progressElement.style.display = "none";
      setSimulatorState("error", "Error");
      setStatus("The simulator hit an error.");
      if (text) {
        outputElement.textContent += text + "\n";
      }
    }

    function focusCanvas() {
      canvasElement.focus();
    }

    var Module = {
      preRun: [],
      postRun: [],
      canvas: canvasElement,
      print: function(text) {
        if (arguments.length > 1) {
          text = Array.prototype.slice.call(arguments).join(" ");
        }
        outputElement.textContent += text + "\n";
      },
      printErr: function(text) {
        if (arguments.length > 1) {
          text = Array.prototype.slice.call(arguments).join(" ");
        }
        outputElement.textContent += text + "\n";
        showError(text);
      },
      setStatus: function(text) {
        if (!text) {
          runtimeReady = true;
          audioEnabled = Module._sim_audio_enabled ? !!Module._sim_audio_enabled() : false;
          spinnerElement.style.display = "none";
          progressElement.style.display = "none";
          setSimulatorState("ready", "Ready");
          setAudioState(audioEnabled ? "on" : "off", audioEnabled ? "Enabled" : "Off");
          refreshControls();
          setStatus("Simulator ready. Click inside to focus keyboard input.");
          return;
        }

        var match = text.match(/([^(]+)\((\d+(?:\.\d+)?)\/(\d+)\)/);
        if (match) {
          setStatus(match[1].trim());
          setProgress((parseFloat(match[2]) / parseFloat(match[3])) * 100);
          return;
        }

        setStatus(text);
      },
      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies || 0, left);
        if (left) {
          var done = this.totalDependencies - left;
          setStatus("Preparing assets...");
          setProgress((done / this.totalDependencies) * 100);
        } else {
          spinnerElement.style.display = "none";
          setProgress(100);
        }
      },
      totalDependencies: 0
    };

    audioToggle.addEventListener("click", function() {
      if (!runtimeReady) {
        return;
      }

      audioToggle.disabled = true;

      try {
        if (audioEnabled) {
          if (Module._sim_disable_audio) {
            Module._sim_disable_audio();
          }
          audioEnabled = false;
          setAudioState("off", "Off");
          setStatus("Browser audio disabled.");
        } else {
          var enabled = Module._sim_enable_audio ? Module._sim_enable_audio() : 0;
          if (enabled) {
            audioEnabled = true;
            setAudioState("on", "Enabled");
            setStatus("Audio enabled. Click the simulator to focus keyboard input.");
          } else {
            setAudioState("error", "Failed");
            setStatus("Audio could not start. Try again after interacting with the page.");
          }
        }
      } catch (error) {
        setAudioState("error", "Failed");
        showError(error && error.message ? error.message : String(error));
      } finally {
        refreshControls();
        focusCanvas();
      }
    });

    focusToggle.addEventListener("click", function() {
      focusCanvas();
      setStatus("Keyboard focus moved to the simulator.");
    });

    resetButton.addEventListener("click", function() {
      setStatus("Resetting simulator...");
      window.location.reload();
    });

    loadDemoButton.addEventListener("click", function() {
      setStatus("Reloading built-in demo state...");
      window.location.reload();
    });

    canvasElement.addEventListener("mousedown", function() {
      if (runtimeReady) {
        focusCanvas();
      }
    });

    canvasElement.addEventListener("webglcontextlost", function(event) {
      event.preventDefault();
      showError("WebGL context lost. Please reload the page.");
    });

    window.addEventListener("error", function(event) {
      showError(event.message || "Unexpected browser error.");
    });

    window.addEventListener("unhandledrejection", function(event) {
      var reason = event.reason;
      showError(reason && reason.message ? reason.message : String(reason));
    });

    window.addEventListener("resize", function() {
      if (runtimeReady) {
        setStatus("Window resized. Click the simulator again if keyboard focus feels lost.");
      }
    });

    setSimulatorState("loading", "Loading");
    setAudioState("off", "Off");
    refreshControls();
    Module.setStatus("Downloading simulator...");
  </script>
  <script async src="sequencer.js"></script>
</body>
</html>
