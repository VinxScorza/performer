name: Update forks latest releases

on:
  workflow_dispatch:
  schedule:
    - cron: "20 5 * * 1"

jobs:
  update-forks-latest-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update forks latest release data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/update_forks_release_dates.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- docs/forks/index.html; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/forks/index.html
          git commit -m "Update forks latest releases"
          git push
